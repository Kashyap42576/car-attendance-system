<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver ID - Transport Department</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* Exact layout and color matching from your photo */
        body {
            margin: 0;
            padding: 15px;
            background-color: #fce268; /* The outer yellow border */
            font-family: 'Arial', sans-serif;
            text-align: center;
            height: 100vh;
            box-sizing: border-box;
        }
        .id-card {
            background-color: #ffffff;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
            box-sizing: border-box;
            position: relative;
        }
        /* Small logout button tucked in the corner */
        .logout-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #e74c3c;
            color: white;
            text-decoration: none;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 12px;
            z-index: 10;
        }
        .logo-container img {
            width: 250px;
            max-width: 90%;
        }
        .dept-badge {
            background-color: #586eef; /* The specific blue pill */
            color: white;
            font-size: 26px;
            font-weight: bold;
            padding: 10px 30px;
            border-radius: 50px;
            margin-top: 10px;
            margin-bottom: 30px;
            width: 85%;
            box-sizing: border-box;
        }
        .name-text {
            color: #586eef; 
            font-size: 65px;
            font-weight: 900;
            margin: 0;
            line-height: 1.1;
            text-transform: capitalize;
        }
        .id-text {
            color: #2b1b3d; /* The very dark purple/black */
            font-size: 85px;
            font-weight: 900;
            margin: 20px 0;
            letter-spacing: -2px;
        }
        .scan-btn {
            background-color: #fce268;
            color: #586eef;
            font-size: 45px;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            padding: 15px 50px;
            cursor: pointer;
            margin-top: auto; /* Pushes button perfectly to the bottom */
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .scan-btn:active {
            transform: scale(0.98);
        }
        #reader-container {
            width: 100%;
            max-width: 350px;
            margin-top: auto;
            margin-bottom: 20px;
            display: none; /* Hidden until the yellow button is clicked */
        }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; border: 3px solid #fce268;}
        #status { font-weight: bold; font-size: 18px; margin-top: 15px; color: #333; }
    </style>
</head>
<body>

<div class="id-card">
    <a href="/logout" class="logout-btn">Logout</a>
    
    <div class="logo-container">
        <img src="https://www.freelogovectors.net/wp-content/uploads/2022/03/parul-university-logo_freelogovectors.net_.png" alt="Parul University">
    </div>
    
    <div class="dept-badge">Transport Department</div>
    
    <div id="dynamic-name"></div>
    
    <div class="id-text">{{ driver_id }}</div>
    
    <button class="scan-btn" id="start-scan-btn" onclick="startScanner()">Scan QR</button>
    
    <div id="reader-container">
        <div id="reader"></div>
        <p id="status">Connecting to camera...</p>
    </div>
</div>

<script>
    // Grab the dynamic data passed from Python
    const sessionDriverId = "{{ driver_id }}";
    const sessionDriverName = "{{ driver_name }}";
    
    // Split the name to stack vertically exactly like the photo
    const nameContainer = document.getElementById('dynamic-name');
    const nameParts = sessionDriverName.split(' ');
    nameParts.forEach(part => {
        let p = document.createElement('p');
        p.className = 'name-text';
        p.innerText = part;
        nameContainer.appendChild(p);
    });

    let html5QrCode;

    function startScanner() {
        // 1. Trigger the GPS permission popup IMMEDIATELY when the button is clicked
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => { console.log("GPS Permission Granted."); }, 
                (error) => { alert("Warning: GPS permission is required to log cars!"); } 
            );
        } else {
            alert("Geolocation is not supported by your browser.");
        }

        // 2. Hide the button and show the camera box
        document.getElementById('start-scan-btn').style.display = 'none';
        document.getElementById('reader-container').style.display = 'block';

        html5QrCode = new Html5Qrcode("reader");
        
        // 3. Force open the rear camera
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: { width: 250, height: 250 } }, 
            onScanSuccess
        ).catch((err) => {
            document.getElementById('status').innerText = "Error accessing rear camera. Check permissions.";
            console.error(err);
        });
    }

    function onScanSuccess(decodedText, decodedResult) {
        // Stop the camera the instant it reads a code
        html5QrCode.stop().then(() => {
            document.getElementById('reader').style.display = 'none';
            document.getElementById('status').innerText = "Securing GPS Location...";
            document.getElementById('status').style.color = "#586eef";

            // Grab the exact coordinates and send to Python
            navigator.geolocation.getCurrentPosition(
                (position) => sendData(sessionDriverId, decodedText, position.coords.latitude, position.coords.longitude),
                (error) => {
                    document.getElementById('status').innerText = "Failed: GPS Denied.";
                    document.getElementById('status').style.color = "#e74c3c";
                    alert("We need your location to log this scan! Please enable GPS.");
                    // Show the scan button again so they can retry
                    setTimeout(() => window.location.reload(), 2000);
                }
            );
        }).catch(err => console.error("Failed to stop scanner.", err));
    }

    function sendData(driverId, carId, lat, lng) {
        fetch('/log_scan', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ driver_id: driverId, car_id: carId, lat: lat, lng: lng })
        })
        .then(response => response.json())
        .then(data => {
            document.getElementById('status').innerText = "✅ " + data.message;
            document.getElementById('status').style.color = "#2ecc71";
            
            // Reload back to the pristine ID card view after 2 seconds
            setTimeout(() => window.location.reload(), 2000);
        })
        .catch((error) => console.error('Error:', error));
    }
</script>
</body>
</html>
