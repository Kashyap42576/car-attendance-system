<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login - Parul University</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 350px; }
        input { width: 90%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; text-align: center; }
        button { width: 100%; padding: 12px; background-color: #586eef; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #4355c7; }
        .error { color: #e74c3c; margin-bottom: 15px; font-weight: bold; }
        img { width: 180px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="https://www.freelogovectors.net/wp-content/uploads/2022/03/parul-university-logo_freelogovectors.net_.png" alt="Parul University">
        <h2>Staff Attendance</h2>
        <p>Please enter your ID</p>
        
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <input type="text" name="staff_id" placeholder="e.g., 1234" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
