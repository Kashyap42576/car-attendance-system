<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff ID - Attendance System</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { margin: 0; padding: 15px; background-color: #fce268; font-family: 'Arial', sans-serif; text-align: center; height: 100vh; box-sizing: border-box; }
        .id-card { background-color: #ffffff; height: 100%; display: flex; flex-direction: column; align-items: center; padding: 20px 10px; box-sizing: border-box; position: relative; }
        .logout-btn { position: absolute; top: 10px; right: 10px; background: #e74c3c; color: white; text-decoration: none; padding: 5px 10px; border-radius: 5px; font-weight: bold; font-size: 12px; z-index: 10; }
        .logo-container img { width: 250px; max-width: 90%; }
        .dept-badge { background-color: #586eef; color: white; font-size: 26px; font-weight: bold; padding: 10px 30px; border-radius: 50px; margin-top: 10px; margin-bottom: 30px; width: 85%; box-sizing: border-box; }
        .name-text { color: #586eef; font-size: 45px; font-weight: 900; margin: 0; line-height: 1.1; text-transform: capitalize; padding: 0 10px;}
        .id-text { color: #2b1b3d; font-size: 75px; font-weight: 900; margin: 20px 0; letter-spacing: -2px; }
        .scan-btn { background-color: #fce268; color: #586eef; font-size: 45px; font-weight: bold; border: none; border-radius: 60px; padding: 15px 50px; cursor: pointer; margin-top: auto; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .scan-btn:active { transform: scale(0.98); }
        #reader-container { width: 100%; max-width: 350px; margin-top: auto; margin-bottom: 20px; display: none; }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; border: 3px solid #fce268;}
        #status { font-weight: bold; font-size: 18px; margin-top: 15px; color: #333; }
    </style>
</head>
<body>

<div class="id-card">
    <a href="/logout" class="logout-btn">Logout</a>
    <div class="logo-container">
        <img src="https://www.freelogovectors.net/wp-content/uploads/2022/03/parul-university-logo_freelogovectors.net_.png" alt="Parul University">
    </div>
    <div class="dept-badge">Staff Attendance</div>
    
    <div id="dynamic-name"></div>
    <div class="id-text">{{ staff_id }}</div>
    
    <button class="scan-btn" id="start-scan-btn" onclick="startScanner()">Scan QR</button>
    
    <div id="reader-container">
        <div id="reader"></div>
        <p id="status">Connecting to camera...</p>
    </div>
</div>

<script>
    const sessionStaffId = "{{ staff_id }}";
    const sessionStaffName = "{{ staff_name }}";
    
    // Stack the name vertically
    const nameContainer = document.getElementById('dynamic-name');
    const nameParts = sessionStaffName.split(' ');
    nameParts.forEach(part => {
        let p = document.createElement('p');
        p.className = 'name-text';
        p.innerText = part;
        nameContainer.appendChild(p);
    });

    let html5QrCode;

    function startScanner() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => { console.log("GPS Permission Granted."); }, 
                (error) => { alert("Warning: GPS permission is required to mark attendance!"); } 
            );
        }

        document.getElementById('start-scan-btn').style.display = 'none';
        document.getElementById('reader-container').style.display = 'block';

        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: { width: 250, height: 250 } }, 
            onScanSuccess
        ).catch((err) => {
            document.getElementById('status').innerText = "Error accessing camera.";
        });
    }

    function onScanSuccess(decodedText, decodedResult) {
        html5QrCode.stop().then(() => {
            document.getElementById('reader').style.display = 'none';
            document.getElementById('status').innerText = "Securing GPS Location...";
            document.getElementById('status').style.color = "#586eef";

            navigator.geolocation.getCurrentPosition(
                (position) => sendData(sessionStaffId, decodedText, position.coords.latitude, position.coords.longitude),
                (error) => {
                    document.getElementById('status').innerText = "❌ Failed: GPS Denied.";
                    document.getElementById('status').style.color = "#e74c3c";
                    alert("We need your location to log attendance!");
                    setTimeout(() => window.location.reload(), 2000);
                }
            );
        });
    }

    function sendData(staffId, qrId, lat, lng) {
        fetch('/log_scan', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ staff_id: staffId, qr_id: qrId, lat: lat, lng: lng })
        })
        .then(response => response.json())
        .then(data => {
            // THE FIX: Only show green if Python says it was a success
            if (data.status === "success") {
                document.getElementById('status').innerText = "✅ " + data.message;
                document.getElementById('status').style.color = "#2ecc71"; // Green
                setTimeout(() => window.location.reload(), 2000);
            } else {
                document.getElementById('status').innerText = "❌ " + data.message;
                document.getElementById('status').style.color = "#e74c3c"; // Red
                // Wait 4 seconds so you can actually read the error message!
                setTimeout(() => window.location.reload(), 4000); 
            }
        })
        .catch((error) => console.error('Error:', error));
    }
</script>
</body>
</html>
